<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EmbedPDF Viewer</title>
  <script src="/vendor/embedpdf/pdf.min.js"></script>
  <link rel="stylesheet" href="/vendor/bootstrap-icons/bootstrap-icons.css">
  <style>
    body {
      margin: 0;
      background-color: #f1f3f4;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #3c4043;
    }
    
    /* Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f3f4;
    }
    ::-webkit-scrollbar-thumb {
      background: #dadce0;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #bdc1c6;
    }

    .toolbar {
      background-color: #ffffff;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid #e8eaed;
      z-index: 10;
      user-select: none;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: #5f6368;
      transition: all 0.2s ease;
      border: none;
      background: none;
      cursor: pointer;
      outline: none;
    }
    .btn-icon:hover {
      background-color: #f1f3f4;
      color: #202124;
    }
    .btn-icon:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      background-color: transparent;
    }
    .btn-icon i {
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-input {
      background-color: #ffffff;
      border: 1px solid #dadce0;
      color: #3c4043;
      padding: 3px 6px;
      width: 28px;
      text-align: center;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      outline: none;
    }
    .page-input:focus {
      border-color: #1a73e8;
    }
    .viewer-container {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
    }
    .pdf-canvas-wrapper {
      background-color: #ffffff;
      box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
      border-radius: 4px;
      margin-bottom: 24px;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-group">
      <button class="btn-icon" id="prev-btn" title="Previous page" disabled>
        <i class="bi bi-chevron-left"></i>
      </button>
      <span style="display: inline-flex; align-items: center; gap: 4px;">
        Page <input type="text" class="page-input" id="page-num" value="1"> of <span id="page-count">-</span>
      </span>
      <button class="btn-icon" id="next-btn" title="Next page" disabled>
        <i class="bi bi-chevron-right"></i>
      </button>
    </div>
    <div class="toolbar-group">
      <button class="btn-icon" id="zoom-out-btn" title="Zoom Out">
        <i class="bi bi-zoom-out"></i>
      </button>
      <span id="zoom-text" style="min-width: 44px; text-align: center;">130%</span>
      <button class="btn-icon" id="zoom-in-btn" title="Zoom In">
        <i class="bi bi-zoom-in"></i>
      </button>
    </div>
    <div class="toolbar-group">
      <button class="btn-icon" id="download-btn" title="Download">
        <i class="bi bi-download"></i>
      </button>
    </div>
  </div>

  <div class="viewer-container">
    <div class="pdf-canvas-wrapper">
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>

  <script>
    // Initialize PDF.js
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = '/vendor/embedpdf/pdf.worker.min.js';

    let pdfDoc = null;
    let pageNum = 1;
    let pageRendering = false;
    let pageNumPending = null;
    let scale = 1.3;
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');

    // Parse target file from URL query string
    const urlParams = new URLSearchParams(window.location.search);
    const fileUrl = urlParams.get('file');

    if (!fileUrl) {
      alert('No PDF file path specified.');
    } else {
      loadDocument(fileUrl);
    }

    function loadDocument(url) {
      pdfjsLib.getDocument(url).promise.then(doc => {
        pdfDoc = doc;
        document.getElementById('page-count').textContent = doc.numPages;
        
        // Enable buttons
        document.getElementById('prev-btn').disabled = false;
        document.getElementById('next-btn').disabled = false;
        
        renderPage(pageNum);
      }).catch(err => {
        console.error('Error loading PDF:', err);
        alert('Failed to render PDF document.');
      });
    }

    function renderPage(num) {
      pageRendering = true;
      
      pdfDoc.getPage(num).then(page => {
        const viewport = page.getViewport({ scale });
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        const renderContext = {
          canvasContext: ctx,
          viewport: viewport
        };
        
        const renderTask = page.render(renderContext);

        renderTask.promise.then(() => {
          pageRendering = false;
          if (pageNumPending !== null) {
            renderPage(pageNumPending);
            pageNumPending = null;
          }
        });
      });

      document.getElementById('page-num').value = num;
      document.getElementById('prev-btn').disabled = (num <= 1);
      document.getElementById('next-btn').disabled = (num >= pdfDoc.numPages);
    }

    function queueRenderPage(num) {
      if (pageRendering) {
        pageNumPending = num;
      } else {
        renderPage(num);
      }
    }

    // Button event listeners
    document.getElementById('prev-btn').addEventListener('click', () => {
      if (pageNum <= 1) return;
      pageNum--;
      queueRenderPage(pageNum);
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if (pageNum >= pdfDoc.numPages) return;
      pageNum++;
      queueRenderPage(pageNum);
    });

    document.getElementById('page-num').addEventListener('change', (e) => {
      const val = parseInt(e.target.value, 10);
      if (val >= 1 && val <= pdfDoc.numPages) {
        pageNum = val;
        queueRenderPage(pageNum);
      }
    });

    document.getElementById('zoom-in-btn').addEventListener('click', () => {
      if (scale >= 3.0) return;
      scale += 0.2;
      document.getElementById('zoom-text').textContent = Math.round(scale * 100) + '%';
      queueRenderPage(pageNum);
    });

    document.getElementById('zoom-out-btn').addEventListener('click', () => {
      if (scale <= 0.6) return;
      scale -= 0.2;
      document.getElementById('zoom-text').textContent = Math.round(scale * 100) + '%';
      queueRenderPage(pageNum);
    });

    document.getElementById('download-btn').addEventListener('click', () => {
      window.open(fileUrl, '_blank');
    });


    // Touchpad Zoom (pinch-to-zoom)
    document.addEventListener('wheel', (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        const delta = e.deltaY;
        if (delta < 0) {
          scale = Math.min(3.0, scale + 0.05);
        } else {
          scale = Math.max(0.5, scale - 0.05);
        }
        document.getElementById('zoom-text').textContent = Math.round(scale * 100) + '%';
        queueRenderPage(pageNum);
      }
    }, { passive: false });
  </script>
</body>
</html>
